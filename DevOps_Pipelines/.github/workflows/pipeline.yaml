name: Python CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  build:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: action/checkout@v5

    - name : Set up Python
      uses: action/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script
      run: python index.py

    - name: Run tests
      run: |
        if [-d tests ]; then python -m unittest discover; fi